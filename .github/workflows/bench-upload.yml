name: Upload Benchmarks to Bencher

# Runs after "Benchmark" completes, in the context of the default branch (so
# it has access to secrets even when the triggering workflow came from a fork
# PR). See https://bencher.dev/docs/how-to/github-actions/#pull-requests-from-forks
# for the canonical fork-safe pattern this implements.
on:
  workflow_run:
    workflows: ["Benchmark"]
    types: [completed]

defaults:
  run:
    shell: pwsh

jobs:
  upload:
    name: Upload all testbed results to Bencher
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pull-requests: write
      checks: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all benchmark artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ^benchmark-results-.*$
          name_is_regexp: true
          run_id: ${{ github.event.workflow_run.id }}
          path: results

      - name: Download triggering event payload
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          name: triggering-event
          run_id: ${{ github.event.workflow_run.id }}

      # For PR-triggered runs, parse event.json and export PR fields as
      # intermediate env vars (never interpolated via ${{ }} to avoid shell
      # injection from untrusted fork branch names).
      - name: Extract PR event data
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const e = JSON.parse(fs.readFileSync('event.json', 'utf8'));
            core.exportVariable('PR_HEAD',     e.pull_request.head.ref);
            core.exportVariable('PR_HEAD_SHA', e.pull_request.head.sha);
            core.exportVariable('PR_BASE',     e.pull_request.base.ref);
            core.exportVariable('PR_BASE_SHA', e.pull_request.base.sha);
            core.exportVariable('PR_NUMBER',   String(e.number));

      - uses: bencherdev/bencher@main

      # Loop over every benchmark-results-<testbed> artifact Benchmark produced.
      # The artifact name after the common prefix is the Bencher testbed name.
      # Failures of individual bencher-run invocations are collected and
      # surfaced after the loop so one failing testbed doesn't mask the others.
      # --error-on-alert is deliberately NOT passed, so a performance alert
      # surfaces in the PR comment without failing the CI job.
      - name: Upload benchmarks to Bencher
        env:
          EVENT: ${{ github.event.workflow_run.event }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $failedTestbeds = @()
          foreach ($resultsDirectory in Get-ChildItem -Path results -Directory -Filter 'benchmark-results-*') {
            $testbed = $resultsDirectory.Name -replace '^benchmark-results-', ''
            $resultsFile = Join-Path $resultsDirectory.FullName 'benchmark_results.json'
            Write-Host "::group::Uploading $testbed"
            $uploadAttempted = $false
            if ($env:EVENT -eq 'pull_request') {
              bencher run `
                --project $env:BENCHER_PROJECT `
                --token $env:BENCHER_API_TOKEN `
                --branch $env:PR_HEAD `
                --hash $env:PR_HEAD_SHA `
                --start-point $env:PR_BASE `
                --start-point-hash $env:PR_BASE_SHA `
                --start-point-clone-thresholds `
                --start-point-reset `
                --testbed $testbed `
                --adapter json `
                --github-actions $env:GITHUB_API_TOKEN `
                --ci-number $env:PR_NUMBER `
                --file $resultsFile
              $uploadAttempted = $true
            } elseif ($env:EVENT -eq 'push' -and $env:HEAD_BRANCH -eq 'main') {
              # Thresholds used for PR alerts are configured once in the
              # Bencher UI, so the main-branch upload is just a baseline.
              bencher run `
                --project $env:BENCHER_PROJECT `
                --token $env:BENCHER_API_TOKEN `
                --branch main `
                --hash $env:HEAD_SHA `
                --testbed $testbed `
                --adapter json `
                --file $resultsFile
              $uploadAttempted = $true
            }
            Write-Host "::endgroup::"
            if ($uploadAttempted -and $LASTEXITCODE -ne 0) {
              Write-Host "::error::bencher run failed for $testbed (exit $LASTEXITCODE)"
              $failedTestbeds += $testbed
            }
          }
          if ($failedTestbeds.Count -gt 0) {
            Write-Host "::error::bencher run failed for: $($failedTestbeds -join ', ')"
            exit 1
          }
