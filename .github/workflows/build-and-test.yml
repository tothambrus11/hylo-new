name: Build and Test
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"

defaults:
  run:
    shell: pwsh

jobs:
  test:
    name: ${{ matrix.testbed }} / ${{ matrix.config }}
    strategy:
      fail-fast: false
      matrix:
        # All {os} x {config} combinations run independently. Debug is x64-only
        # so arm OSes are excluded below.
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-2025, windows-11-arm]
        config: [debug, release]
        exclude:
          - { os: ubuntu-24.04-arm, config: debug }
          - { os: macos-15,         config: debug }
          - { os: windows-11-arm,   config: debug }
        include:
          # Short label used in the job name for readability.
          - { os: ubuntu-24.04,     testbed: linux-x64 }
          - { os: ubuntu-24.04-arm, testbed: linux-arm64 }
          - { os: macos-15,         testbed: macos-arm64 }
          - { os: macos-15-intel,   testbed: macos-x64 }
          - { os: windows-2025,     testbed: windows-x64 }
          - { os: windows-11-arm,   testbed: windows-arm64 }
          # Enable code coverage export in a single configuration.
          - { os: ubuntu-24.04, config: debug, export-coverage: true }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-hylo-toolchain

      - name: Build tests
        run: swift build --build-tests -c ${{ matrix.config }} -Xswiftc -enable-testing --verbose ${{ matrix.export-coverage && '--enable-code-coverage' || '' }}

      - name: Run tests
        run: swift test -c ${{ matrix.config }} --skip-build --verbose ${{ matrix.export-coverage && '--enable-code-coverage' || '' }}

      # ---------- Code coverage (debug ubuntu only) ----------
      - name: Export code coverage
        if: ${{ matrix.export-coverage }}
        run: |
          $binPath = (swift build --show-bin-path).Trim()
          llvm-cov export "$binPath/HyloPackageTests.xctest" --format=lcov --instr-profile "$binPath/codecov/default.profdata" > info.lcov

      - name: Upload coverage report to Codecov
        if: ${{ matrix.export-coverage }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
